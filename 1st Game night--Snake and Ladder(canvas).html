<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast-Paced Snakes & Ladders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0fdf4;
            overflow-x: hidden;
        }

        #board-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid #166534;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: #166534;
            border: 1px solid #dcfce7;
            background: #ffffff;
        }

        .cell:nth-child(even) { background: #f0fdf4; }

        /* SVG layer for drawing snakes and ladders */
        #svg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .token {
            position: absolute;
            width: 6%;
            height: 6%;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: top 0.3s ease-in-out, left 0.3s ease-in-out;
            z-index: 20;
            transform: translate(30%, 30%); /* Center within 10% cell */
        }

        .dice-anim {
            animation: roll 0.5s infinite linear;
        }

        @keyframes roll {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(270deg); }
            100% { transform: rotate(360deg); }
        }

        /* Floating Toast */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: white; padding: 10px 20px;
            border-radius: 999px; opacity: 0; transition: opacity 0.3s;
            z-index: 50; pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .toast-visible { opacity: 1 !important; }
        
        .snake-line { stroke: #ef4444; stroke-width: 4; stroke-linecap: round; opacity: 0.8; }
        .ladder-line { stroke: #10b981; stroke-width: 6; stroke-dasharray: 4 8; stroke-linecap: square; opacity: 0.8; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="toast"></div>

    <div id="start-screen" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl text-center">
        <h1 class="text-4xl font-extrabold text-green-700 mb-2">Snakes & Ladders</h1>
        <p class="text-gray-500 mb-8">Fast-Paced Edition ⚡</p>
        
        <div class="space-y-4">
            <button onclick="startGame('ai')" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition">🤖 1 Player vs AI</button>
            <button onclick="startGame(2)" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition">👤 2 Players</button>
            <button onclick="startGame(3)" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 rounded-lg transition">👤 3 Players</button>
            <button onclick="startGame(4)" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-lg transition">👤 4 Players</button>
        </div>
    </div>

    <div id="game-screen" class="hidden w-full max-w-lg flex flex-col items-center">
        <div class="w-full flex justify-between items-center mb-4 px-2">
            <div>
                <h2 id="turn-indicator" class="text-xl font-bold text-gray-800">Player 1's Turn</h2>
                <p id="action-text" class="text-sm text-gray-500">Waiting to roll...</p>
            </div>
            <button onclick="resetGame()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded">Restart</button>
        </div>

        <div id="board-container">
            <div id="grid" class="absolute inset-0 grid grid-cols-10 grid-rows-10"></div>
            <svg id="svg-layer"></svg>
            <div id="tokens-layer"></div>
        </div>

        <div class="mt-6 flex flex-col items-center bg-white p-4 rounded-xl shadow-lg w-full max-w-xs">
            <div id="dice-display" class="text-5xl mb-3 shadow-inner bg-gray-50 rounded-xl p-4 w-24 h-24 flex items-center justify-center border-2 border-gray-200">🎲</div>
            <button id="roll-btn" onclick="rollDice()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md transition transform active:scale-95">
                Roll Dice
            </button>
        </div>
    </div>

    <div id="win-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full transform scale-110 transition-transform">
            <h2 class="text-5xl mb-4">🎉</h2>
            <h3 id="win-text" class="text-2xl font-bold text-gray-800 mb-6">Player 1 Wins!</h3>
            <button onclick="resetGame()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg">Play Again</button>
        </div>
    </div>

    <script>
        // --- Game Data (Optimized for Fast Gameplay) ---
        // Ladders: Lots of forward momentum
        const ladders = { 4: 25, 13: 46, 33: 49, 42: 63, 50: 69, 62: 81, 74: 92 };
        // Snakes: Few setbacks, mostly small drops
        const snakes = { 27: 5, 40: 3, 43: 18, 54: 31, 66: 45, 76: 58, 89: 53, 99: 41 };
        
        const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b']; // Blue, Red, Green, Yellow
        const playerNames = ["Player 1 (Blue)", "Player 2 (Red)", "Player 3 (Green)", "Player 4 (Yellow)"];
        
        let players = [];
        let currentPlayer = 0;
        let isAiMode = false;
        let isAnimating = false;

        // --- Audio Context for Synthetic Sounds ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'dice') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'ladder') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'snake') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            } else if (type === 'win') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.2);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
                osc.start(); osc.stop(audioCtx.currentTime + 0.8);
            }
        }

        // --- Core Setup & Utility ---
        function getCoords(pos) {
            let zeroBased = pos - 1;
            let rowFromBottom = Math.floor(zeroBased / 10);
            let colFromLeft = zeroBased % 10;
            // Zig-zag logic
            if (rowFromBottom % 2 !== 0) colFromLeft = 9 - colFromLeft;
            let rowFromTop = 9 - rowFromBottom;
            return { col: colFromLeft, row: rowFromTop };
        }

        function buildBoard() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            // Generate cells 100 to 1 visually
            for (let i = 100; i >= 1; i--) {
                let coords = getCoords(i);
                let div = document.createElement('div');
                div.className = 'cell';
                div.textContent = i;
                div.style.gridRowStart = coords.row + 1;
                div.style.gridColumnStart = coords.col + 1;
                grid.appendChild(div);
            }
            drawSnakesAndLadders();
        }

        function drawSnakesAndLadders() {
            const svg = document.getElementById('svg-layer');
            svg.innerHTML = '';
            
            const createLine = (start, end, className) => {
                let sCoords = getCoords(start);
                let eCoords = getCoords(end);
                let line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', `${sCoords.col * 10 + 5}%`);
                line.setAttribute('y1', `${sCoords.row * 10 + 5}%`);
                line.setAttribute('x2', `${eCoords.col * 10 + 5}%`);
                line.setAttribute('y2', `${eCoords.row * 10 + 5}%`);
                line.setAttribute('class', className);
                svg.appendChild(line);
            };

            for (let [start, end] of Object.entries(ladders)) createLine(parseInt(start), end, 'ladder-line');
            for (let [start, end] of Object.entries(snakes)) createLine(parseInt(start), end, 'snake-line');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('toast-visible');
            setTimeout(() => toast.classList.remove('toast-visible'), 2000);
        }

        // --- Game Logic ---
        function startGame(mode) {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('win-modal').classList.add('hidden');
            
            isAiMode = mode === 'ai';
            let numPlayers = isAiMode ? 2 : mode;
            
            if (isAiMode) {
                playerNames[0] = "You (Blue)";
                playerNames[1] = "AI Bot (Red)";
            } else {
                playerNames[0] = "Player 1 (Blue)";
                playerNames[1] = "Player 2 (Red)";
            }

            players = Array.from({length: numPlayers}, (_, i) => ({ pos: 1, color: colors[i] }));
            currentPlayer = 0;
            isAnimating = false;
            
            buildBoard();
            renderTokens();
            updateUI();
        }

        function resetGame() {
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('win-modal').classList.add('hidden');
        }

        function renderTokens() {
            const layer = document.getElementById('tokens-layer');
            layer.innerHTML = '';
            players.forEach((p, i) => {
                let coords = getCoords(p.pos);
                let token = document.createElement('div');
                token.className = 'token';
                token.style.backgroundColor = p.color;
                token.style.left = `${coords.col * 10}%`;
                token.style.top = `${coords.row * 10}%`;
                // Slight offset so multiple tokens don't perfectly overlap
                token.style.transform = `translate(${20 + i*10}%, ${20 + i*10}%)`;
                layer.appendChild(token);
            });
        }

        function updateUI() {
            const ind = document.getElementById('turn-indicator');
            const act = document.getElementById('action-text');
            const btn = document.getElementById('roll-btn');
            
            ind.textContent = playerNames[currentPlayer] + "'s Turn";
            ind.style.color = players[currentPlayer].color;
            
            if (isAiMode && currentPlayer === 1) {
                act.textContent = "AI is thinking...";
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                setTimeout(rollDice, 1000);
            } else {
                act.textContent = "Waiting to roll...";
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        async function rollDice() {
            if (isAnimating || (isAiMode && currentPlayer === 1 && document.activeElement === document.getElementById('roll-btn'))) return;
            
            isAnimating = true;
            document.getElementById('roll-btn').disabled = true;
            
            playSound('dice');
            const diceDiv = document.getElementById('dice-display');
            diceDiv.classList.add('dice-anim');
            
            // Simulating a fast 500ms roll
            await new Promise(r => setTimeout(r, 500));
            diceDiv.classList.remove('dice-anim');
            
            const roll = Math.floor(Math.random() * 6) + 1;
            const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            diceDiv.textContent = diceFaces[roll - 1];
            
            document.getElementById('action-text').textContent = `Rolled a ${roll}!`;
            await movePlayer(roll);
        }

        async function movePlayer(roll) {
            let target = players[currentPlayer].pos + roll;
            if (target > 100) {
                // Exact finish required or bounce logic. For speed, we just stop at 100 if overshoot.
                target = 100; 
            }

            // Step-by-step animation
            while (players[currentPlayer].pos < target) {
                players[currentPlayer].pos++;
                renderTokens();
                await new Promise(r => setTimeout(r, 150)); // Fast step speed
            }

            await checkSnakesLadders();
        }

        async function checkSnakesLadders() {
            let pos = players[currentPlayer].pos;
            
            if (ladders[pos]) {
                playSound('ladder');
                showToast("Climbed a ladder! 🎉");
                await new Promise(r => setTimeout(r, 500));
                players[currentPlayer].pos = ladders[pos];
                renderTokens();
                await new Promise(r => setTimeout(r, 500));
            } else if (snakes[pos]) {
                playSound('snake');
                showToast("Bitten by a snake! 🐍");
                await new Promise(r => setTimeout(r, 500));
                players[currentPlayer].pos = snakes[pos];
                renderTokens();
                await new Promise(r => setTimeout(r, 500));
            }

            if (players[currentPlayer].pos === 100) {
                playSound('win');
                document.getElementById('win-text').textContent = playerNames[currentPlayer] + " Wins!";
                document.getElementById('win-modal').classList.remove('hidden');
                return;
            }

            // Next Turn
            currentPlayer = (currentPlayer + 1) % players.length;
            isAnimating = false;
            updateUI();
        }

    </script>
</body>
</html>
